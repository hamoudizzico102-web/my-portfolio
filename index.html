<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamad Moukaddem</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar">
    <h2>MM</h2>
</nav>

<header class="hero">
    <img src="me.png" class="hero-bg">
    <div class="hero-content">
        <h1>DESIGN & VIDEO</h1>
        <p>High-End Editing & Creative Direction</p>

        <div class="buttons">
            <button onclick="scrollToSection()">View Work</button>
            <button onclick="openCV()">Resume</button>
        </div>
    </div>
</header>

<main>

<section id="editing">
    <h2>Video Editing</h2>
    <div class="row" id="row1">

        <div class="card" onclick="openModal('tpl1')">
            <img src="sebastien_thumb.jpg">
        </div>

        <div class="card" onclick="openModal('tpl2')">
            <img src="405229718.jpg">
        </div>

    </div>
</section>

<section id="design">
    <h2>Design</h2>
    <div class="row">

        <div class="card" onclick="openImage('1.png')">
            <img src="1.png">
        </div>

        <div class="card" onclick="openImage('5.png')">
            <img src="5.png">
        </div>

    </div>
</section>

</main>

<!-- Modal -->
<div id="modal" class="modal">
    <span onclick="closeModal()">✕</span>
    <div id="modal-content"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="modal">
    <span onclick="closeLightbox()">✕</span>
    <img id="lightbox-img">
</div>

<!-- CV -->
<div id="cv" class="modal">
    <span onclick="closeCV()">✕</span>
    <iframe src="cv.pdf"></iframe>
</div>

<!-- Templates -->
<template id="tpl1">
<iframe src="https://www.youtube.com/embed/AzAXmB-KY5M"></iframe>
</template>

<template id="tpl2">
<iframe src="https://www.youtube.com/embed/ChGxyGwRdFE"></iframe>
</template>

<script src="script.js"></script>
</body>
</html>
